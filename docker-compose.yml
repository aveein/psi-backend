services:
  mysql:
    image: mysql:8.0
    container_name: suvadigital-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-suvadigital}
    ports:
      - "47821:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - suvadigital-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 10

  phpmyadmin:
    image: phpmyadmin:5
    container_name: suvadigital-phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-root}
      PMA_PASSWORD: ${DB_PASSWORD:-rootpass}
      UPLOAD_LIMIT: 64M
    ports:
      - "39152:80"
    networks:
      - suvadigital-net
    depends_on:
      mysql:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suvadigital-backend
    restart: unless-stopped
    environment:
      APP_URL: ${APP_URL:-http://localhost:51847}
      DB_NAME: ${DB_NAME:-suvadigital}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD:-rootpass}
      DB_HOST: mysql
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-secret_key_blue}
    ports:
      - "51847:3001"
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - suvadigital-net
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
  backend_uploads:

networks:
  suvadigital-net:
    name: suvadigital-net
    driver: bridge
